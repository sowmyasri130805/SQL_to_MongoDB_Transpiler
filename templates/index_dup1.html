<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
body {
  margin: 0;
  font-family: Arial;
  background: #121212;
  color: #E0E0E0;
}

.topbar {
  height: 60px;
  background: #1E1E1E;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 20px;
  border-bottom: 1px solid #333;
}

button {
  padding: 10px 16px;
  border-radius: 6px;
  border: none;
  background: #4CAF50;
  color: white;
  cursor: pointer;
}

button:hover {
  background: #45a049;
}

.container {
  display: flex;
  height: calc(100vh - 60px);
}

.panel {
  flex: 1;
  padding: 15px;
  border-right: 1px solid #333;
  display: flex;
  flex-direction: column;
  gap: 10px;
}

textarea {
  width: 100%;
  height: 120px;
  background: #1E1E1E;
  color: white;
  border: 1px solid #333;
  padding: 10px;
  resize: none;
}

.output {
  height: 200px;
  overflow-y: auto;
}

h4 {
  margin: 5px 0;
}
</style>
</head>

<body>

<div class="topbar">
  <h3>SQL → MongoDB Playground</h3>
  <button onclick="runAll()">Run All</button>
</div>

<div class="container">

<!-- LEFT -->
<div class="panel">

  <h4>Mongo Insert</h4>
  <textarea id="mongoInsert"></textarea>

  <h4>Schema (JSON)</h4>
  <textarea id="schemaText"></textarea>

  <h4>SQL Query</h4>
  <textarea id="sqlText"></textarea>

</div>

<!-- RIGHT -->
<div class="panel">

  <h4>Generated Mongo Query</h4>
  <textarea id="mongoOutput" readonly></textarea>

  <h4>Execution Output</h4>
  <textarea id="execOutput" class="output" readonly></textarea>

</div>

</div>

<script>

window.onload = () => {
  document.getElementById("mongoInsert").value =
`db.users.insert_many([
  {"id": 1, "name": "John", "age": 30},
  {"id": 2, "name": "Alice", "age": 20},
  {"id": 3, "name": "Bob", "age": 40}
])`;

  document.getElementById("schemaText").value =
`{
  "users": {
    "id": "int",
    "name": "string",
    "age": "int"
  }
}`;

  document.getElementById("sqlText").value =
"SELECT * FROM users WHERE age > 25;";
};

async function runAll() {

  let insertQuery = document.getElementById("mongoInsert").value.trim();
  let schema = document.getElementById("schemaText").value.trim();
  let sql = document.getElementById("sqlText").value.trim();

  let parsedSchema;

  try {
    parsedSchema = JSON.parse(schema);
  } catch {
    alert("Invalid schema JSON");
    return;
  }

  try {

    // 🔥 Clear collection
    await fetch("/mongo", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ query: "db.users.deleteMany({})" })
    });

    // 🔥 Insert data
    if (insertQuery) {
      await fetch("/mongo", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ query: insertQuery })
      });
    }

    // 🔥 Run transpiler
    const res = await fetch("/run", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        sql: sql,
        schema: parsedSchema
      })
    });

    const data = await res.json();

    document.getElementById("mongoOutput").value = data.mongo || "";

    document.getElementById("execOutput").value =
      data.error ? data.error : JSON.stringify(data.result, null, 2);

  } catch (err) {
    alert("Error: " + err);
  }
}

</script>

</body>
</html>
